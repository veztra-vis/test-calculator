<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maya | Internal Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } } }
    </script>
    <style>
        body { background: #08090A; }
        * { -webkit-tap-highlight-color: transparent; }
        button, a { touch-action: manipulation; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }
        input, select, textarea { font-size: 16px !important; }
        .sidebar-item { transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(0, 209, 122, 0.08); border-left-color: #00D17A; color: white; }
        .glass-panel { background: rgba(17, 17, 19, 0.8); border: 1px solid #1e1e20; }
        .role-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .role-tag-admin { background: rgba(0, 209, 122, 0.15); color: #00D17A; }
        .role-tag-agent { background: rgba(113, 113, 122, 0.15); color: #a1a1aa; }
        .role-tag-team leader { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .role-tag-operations manager { background: rgba(0, 153, 90, 0.15); color: #34d399; }
        .msg-mine { background: #00995A; color: white; border-radius: 16px 16px 4px 16px; }
        .msg-theirs { background: #18181b; color: #e4e4e7; border-radius: 16px 16px 16px 4px; }
    </style>
</head>
<body class="text-zinc-100 font-sans h-screen flex flex-col overflow-hidden">

    <div class="md:hidden flex items-center justify-between p-4 bg-zinc-950 border-b border-zinc-800 z-30 flex-shrink-0">
        <button onclick="toggleSidebar()" class="text-zinc-400 hover:text-white p-1">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 class="text-base font-bold text-white">Maya Terminal</h1>
        <div class="w-8"></div>
    </div>

    <div class="flex flex-1 overflow-hidden relative">
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden" style="backdrop-filter: blur(2px);"></div>

        <aside id="sidebar" class="fixed md:relative inset-y-0 left-0 z-50 w-72 bg-zinc-950 border-r border-zinc-800 flex flex-col h-full transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex-shrink-0">
            <div class="p-5 border-b border-zinc-800 flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center text-emerald-400 font-bold text-lg">M</div>
                <div><h1 class="text-lg font-bold text-white">Maya Terminal</h1><p class="text-[9px] text-zinc-500 uppercase tracking-widest">Operations Hub</p></div>
            </div>
            <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
                <button onclick="showPage('dashboard')" class="sidebar-item active w-full text-left px-4 py-3 text-base text-zinc-400 rounded-r-lg flex items-center gap-3" data-page="dashboard">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </button>
                <button onclick="showPage('comms')" class="sidebar-item w-full text-left px-4 py-3 text-base text-zinc-400 rounded-r-lg flex items-center gap-3" data-page="comms">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                    Floor Comms
                </button>
                
                <p class="px-4 text-[9px] uppercase tracking-widest text-zinc-600 mt-6 mb-2 font-semibold" id="admin-nav-header" style="display:none;">Administration</p>
                <button onclick="showPage('mod-admin')" id="admin-nav-btn" class="sidebar-item w-full text-left px-4 py-3 text-base text-zinc-400 rounded-r-lg flex items-center gap-3" data-page="mod-admin" style="display:none;">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
                    User Management
                </button>
            </nav>
            <div class="p-4 border-t border-zinc-800 bg-zinc-950 flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-zinc-800 flex items-center justify-center text-sm font-bold text-emerald-400" id="sidebar-avatar">A</div>
                <div class="flex-1 min-w-0 truncate"><p class="text-sm font-medium text-zinc-200 truncate" id="sidebar-name">User</p><p class="text-[10px] text-zinc-500 truncate" id="sidebar-role">Role</p></div>
                <button onclick="handleLogout()" class="text-zinc-600 hover:text-red-400 p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-zinc-950 p-4 md:p-8">
            
            <div id="page-dashboard" class="page-content max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold text-white mb-2">Welcome back, <span id="dash-name" class="text-emerald-400">User</span></h2>
                <p class="text-zinc-500 mb-10">Internal Operations Hub</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="showPage('comms')" class="glass-panel rounded-xl p-8 text-left hover:border-emerald-500/50 transition-all group">
                        <div class="w-12 h-12 rounded-xl bg-emerald-600/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400 mb-4 group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-1">Floor Comms</h3>
                        <p class="text-zinc-500 text-sm">Open the team chat to communicate with agents and managers.</p>
                    </button>
                    <div class="glass-panel rounded-xl p-8">
                        <div class="w-12 h-12 rounded-xl bg-blue-600/10 border border-blue-500/20 flex items-center justify-center text-blue-400 mb-4">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-1">System Status</h3>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            <p class="text-zinc-400 text-sm font-medium">All Systems Operational</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-comms" class="page-content h-[calc(100vh-8rem)] md:h-[calc(100vh-4rem)] max-w-6xl mx-auto flex glass-panel rounded-xl overflow-hidden" style="display: none;">
                <div class="w-56 border-r border-zinc-800 flex flex-col bg-zinc-950/50 flex-shrink-0">
                    <div class="p-4 border-b border-zinc-800"><h3 class="font-bold text-sm text-white">Channels</h3></div>
                    <div class="flex-1 overflow-y-auto p-2">
                        <button onclick="loadChannel('general', this)" class="w-full text-left px-3 py-3 rounded-md text-sm text-zinc-300 bg-zinc-800 flex items-center gap-2 mb-1 ch-btn active-ch"><span class="text-zinc-500">#</span> general</button>
                        <button onclick="loadChannel('announcements', this)" class="w-full text-left px-3 py-3 rounded-md text-sm text-zinc-300 hover:bg-zinc-800 flex items-center gap-2 mb-4 ch-btn"><span class="text-zinc-500">#</span> announcements</button>
                        <p class="px-3 text-[9px] uppercase tracking-widest text-zinc-600 mb-2 font-semibold">Members</p>
                        <div id="dm-list" class="space-y-1"></div>
                    </div>
                </div>
                <div class="flex-1 flex flex-col bg-zinc-950">
                    <div class="p-4 border-b border-zinc-800 bg-zinc-900/50 flex justify-between items-center">
                        <div><h3 class="font-bold text-sm text-white" id="chat-header-title"># general</h3><p class="text-[10px] text-zinc-500" id="chat-header-sub">Company-wide updates</p></div>
                    </div>
                    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col"><p class="text-zinc-600 text-sm text-center mt-10">Connecting to server...</p></div>
                    <div class="p-4 border-t border-zinc-800 bg-zinc-900/30">
                        <form onsubmit="sendMessage(event)" class="flex gap-3">
                            <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder-zinc-500 outline-none focus:border-emerald-500" autocomplete="off">
                            <button type="submit" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl">Send</button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="page-mod-admin" class="page-content max-w-5xl mx-auto pb-20" style="display: none;">
                <div class="glass-panel rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3"><span class="w-1.5 h-8 bg-emerald-500 rounded-full"></span><h2 class="text-lg font-bold text-white">User Management</h2></div>
                        <button onclick="document.getElementById('admin-create-form').classList.toggle('hidden')" class="px-4 py-2 bg-emerald-600 text-white text-sm font-bold rounded-lg">Create User</button>
                    </div>
                    <div id="admin-create-form" class="hidden mb-6 bg-zinc-950/50 border border-zinc-800 rounded-xl p-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <input type="text" id="c-fullname" placeholder="Full Name" class="bg-zinc-900 border border-zinc-800 rounded-lg py-3 px-3 text-white outline-none">
                            <input type="text" id="c-empid" placeholder="Employee ID" class="bg-zinc-900 border border-zinc-800 rounded-lg py-3 px-3 text-white font-mono outline-none">
                            <input type="password" id="c-pass" placeholder="Password" class="bg-zinc-900 border border-zinc-800 rounded-lg py-3 px-3 text-white font-mono outline-none">
                            <select id="c-role" class="bg-zinc-900 border border-zinc-800 rounded-lg py-3 px-3 text-white outline-none"><option value="AGENT">Agent</option><option value="TRAINING">Training</option><option value="TEAM LEADER">Team Leader</option><option value="OPERATIONS MANAGER">Ops Manager</option></select>
                        </div>
                        <button onclick="createUser()" class="px-5 py-2 bg-emerald-600 text-white text-sm font-bold rounded-lg">Save User</button>
                    </div>
                    <div class="overflow-x-auto rounded-lg border border-zinc-800">
                        <table class="w-full text-left text-sm"><thead class="bg-zinc-900 text-zinc-400 uppercase text-xs"><tr><th class="px-4 py-3">ID</th><th class="px-4 py-3">Name</th><th class="px-4 py-3 text-center">Role</th><th class="px-4 py-3 text-right">Action</th></tr></thead><tbody id="admin-users-tbody" class="text-zinc-300 divide-y divide-zinc-800/50"><tr><td colspan="4" class="text-center py-6 text-zinc-500">Loading...</td></tr></tbody></table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        let currentUser = null, token = localStorage.getItem('maya_token') || null, allUsers = [], currentChatTarget = { type: 'channel', id: 'general' }, chatInterval = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        window.onload = async () => {
            if (!token) return window.location.href = '/';
            try {
                let res = await fetch('/api/auth/verify', { headers: { 'x-maya-token': token } });
                if (!res.ok) throw new Error();
                currentUser = (await res.json()).user;
                initUI(); 
                startCommsPolling();
            } catch (e) { window.location.href = '/'; }
        };

        function initUI() {
            document.getElementById('sidebar-name').innerText = currentUser.name;
            document.getElementById('sidebar-role').innerText = currentUser.role;
            document.getElementById('sidebar-avatar').innerText = currentUser.name.charAt(0).toUpperCase();
            document.getElementById('dash-name').innerText = currentUser.name.split(' ')[0];
            if (['ADMIN', 'OPERATIONS MANAGER', 'TEAM LEADER'].includes(currentUser.role)) { 
                document.getElementById('admin-nav-header').style.display = 'block'; 
                document.getElementById('admin-nav-btn').style.display = 'flex'; 
            }
            loadDMList();
        }

        function showPage(p) {
            if (window.innerWidth < 768) { 
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebar-overlay').classList.add('hidden');
            }
            document.querySelectorAll('.page-content').forEach(el => el.style.display = 'none');
            document.getElementById('page-' + p).style.display = p === 'comms' ? 'flex' : 'block';
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-page="${p}"]`)?.classList.add('active');
            if (p === 'mod-admin') loadAdminUsers();
            if (p === 'comms') fetchMessages();
        }

        async function loadDMList() {
            try {
                let res = await fetch('/api/comms/users', { headers: { 'x-maya-token': token } });
                if (!res.ok) throw new Error();
                allUsers = await res.json();
                document.getElementById('dm-list').innerHTML = allUsers.filter(u => u.employeeId !== currentUser.id).map(u => `
                    <button onclick="loadDM('${u.employeeId}', this)" class="w-full text-left px-3 py-2 rounded-md text-sm text-zinc-300 hover:bg-zinc-800 flex items-center justify-between dm-btn">
                        <span class="truncate">${u.fullName}</span> 
                        <span class="role-tag role-tag-${u.role.toLowerCase()} ml-2">${u.role.split(' ')[0]}</span>
                    </button>`).join('');
            } catch (e) { document.getElementById('dm-list').innerHTML = '<p class="text-xs text-red-400 px-2">Error loading users</p>'; }
        }

        function loadChannel(id, el) {
            currentChatTarget = { type: 'channel', id };
            document.getElementById('chat-header-title').innerText = '# ' + id;
            document.getElementById('chat-header-sub').innerText = 'Company-wide channel';
            document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('bg-zinc-800')); if(el) el.classList.add('bg-zinc-800');
            document.querySelectorAll('.dm-btn').forEach(b => b.classList.remove('bg-zinc-800'));
            fetchMessages();
        }

        function loadDM(id, el) {
            currentChatTarget = { type: 'dm', id };
            let user = allUsers.find(u => u.employeeId === id);
            document.getElementById('chat-header-title').innerText = user.fullName;
            document.getElementById('chat-header-sub').innerText = user.role;
            document.querySelectorAll('.dm-btn').forEach(b => b.classList.remove('bg-zinc-800')); if(el) el.classList.add('bg-zinc-800');
            document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('bg-zinc-800'));
            fetchMessages();
        }

        async function fetchMessages() {
            let url = '/api/comms/messages?' + (currentChatTarget.type === 'dm' ? `recipientId=${currentChatTarget.id}` : `channel=${currentChatTarget.id}`);
            try {
                let res = await fetch(url, { headers: { 'x-maya-token': token } });
                if (!res.ok) throw new Error();
                let msgs = await res.json();
                let c = document.getElementById('chat-messages');
                if (!msgs.length) { c.innerHTML = '<p class="text-zinc-600 text-sm text-center mt-10">No messages yet. Say hello!</p>'; return; }
                let html = '', lastDate = '';
                msgs.forEach(m => {
                    let d = new Date(m.createdAt).toLocaleDateString();
                    if (d !== lastDate) { html += `<div class="text-center text-zinc-600 text-[10px] uppercase tracking-widest my-4">${d}</div>`; lastDate = d; }
                    let isMine = m.senderId === currentUser.id;
                    html += `<div class="flex ${isMine ? 'justify-end' : 'justify-start'}">
                        <div class="msg-bubble px-4 py-3 max-w-[75%] ${isMine ? 'msg-mine' : 'msg-theirs'}">
                            ${!isMine ? `<p class="text-[10px] font-bold text-emerald-400 mb-1">${m.senderName}</p>` : ''}
                            <p>${m.text.replace(/</g, "&lt;")}</p>
                            <p class="text-[9px] ${isMine ? 'text-emerald-200' : 'text-zinc-500'} text-right mt-1">${new Date(m.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>`;
                });
                c.innerHTML = html; c.scrollTop =
