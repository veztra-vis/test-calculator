<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maya | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CRITICAL BASE STYLES (No CDN dependency) */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #08090A; color: #e4e4e7; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        button, a { touch-action: manipulation; cursor: pointer; }
        input, select, textarea { font-size: 16px !important; } /* Stops tablet zoom */
        
        /* Layout */
        .app-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
        .main-content { flex: 1; overflow-y: auto; background: #08090A; padding: 20px; }
        @media (min-width: 768px) { .main-content { padding: 40px; } }

        /* Sidebar */
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 40; backdrop-filter: blur(2px); display: none; }
        .sidebar-overlay.open { display: block; }
        .sidebar { position: fixed; top: 0; left: 0; width: 300px; height: 100%; background: #09090b; border-right: 1px solid #27272a; display: flex; flex-direction: column; z-index: 50; transform: translateX(-100%); transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        @media (min-width: 768px) { .sidebar { position: relative; transform: translateX(0); } }

        .sidebar-header { padding: 20px; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 12px; }
        .sidebar-logo { width: 40px; height: 40px; border-radius: 10px; background: rgba(0, 209, 122, 0.1); border: 1px solid rgba(0, 209, 122, 0.3); display: flex; align-items: center; justify-content: center; color: #00D17A; font-weight: 800; font-size: 18px; }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 12px; }
        .sidebar-footer { padding: 16px; border-top: 1px solid #27272a; display: flex; align-items: center; gap: 12px; background: #09090b; }
        
        .nav-btn { width: 100%; text-align: left; padding: 12px 16px; font-size: 15px; color: #a1a1aa; background: none; border: none; border-left: 3px solid transparent; border-radius: 0 8px 8px 0; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
        .nav-btn:hover, .nav-btn.active { background: rgba(0, 209, 122, 0.08); border-left-color: #00D17A; color: white; }
        .nav-label { padding: 16px 16px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #52525b; font-weight: 600; display: none; }
        
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: #09090b; border-bottom: 1px solid #27272a; z-index: 30; }
        @media (min-width: 768px) { .topbar { display: none; } }

        /* Pages */
        .page { display: none; }
        .page.active { display: block; }
        .page-chat.active { display: flex; }

        /* Dashboard */
        .dash-grid { display: grid; grid-template-columns: 1fr; gap: 24px; max-width: 800px; margin: 0 auto; }
        @media (min-width: 768px) { .dash-grid { grid-template-columns: 1fr 1fr; } }
        .dash-card { background: rgba(24, 24, 27, 0.8); border: 1px solid #27272a; border-radius: 16px; padding: 32px; text-align: left; transition: border 0.2s; }
        .dash-card:active { border-color: #00D17A; }

        /* Chat */
        .chat-container { height: calc(100vh - 120px); max-width: 1000px; margin: 0 auto; display: flex; background: rgba(24, 24, 27, 0.8); border: 1px solid #27272a; border-radius: 16px; overflow: hidden; }
        @media (min-width: 768px) { .chat-container { height: calc(100vh - 80px); } }
        .chat-sidebar { width: 220px; border-right: 1px solid #27272a; display: flex; flex-direction: column; flex-shrink: 0; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #09090b; }
        .chat-header { padding: 16px; border-bottom: 1px solid #27272a; background: rgba(24, 24, 27, 0.5); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .chat-input-area { padding: 16px; border-top: 1px solid #27272a; background: rgba(24, 24, 27, 0.3); display: flex; gap: 12px; }
        .chat-input-area input { flex: 1; background: #18181b; border: 1px solid #3f3f46; border-radius: 12px; padding: 12px 16px; color: white; outline: none; }
        .chat-input-area input:focus { border-color: #00D17A; }
        .chat-input-area button { background: #00D17A; color: #08090A; font-weight: 700; padding: 12px 24px; border-radius: 12px; border: none; font-size: 15px; }
        
        .ch-btn { width: 100%; text-align: left; padding: 12px; font-size: 14px; color: #d4d4d8; background: none; border: none; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
        .ch-btn:active, .ch-btn.sel { background: #18181b; }
        .dm-btn { width: 100%; text-align: left; padding: 10px 12px; font-size: 13px; color: #d4d4d8; background: none; border: none; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
        .dm-btn:active, .dm-btn.sel { background: #18181b; }
        
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.4; }
        .msg-mine { background: #00995A; color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
        .msg-theirs { background: #18181b; color: #e4e4e7; border-bottom-left-radius: 4px; align-self: flex-start; }
        .role-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; background: rgba(0, 209, 122, 0.15); color: #00D17A; }

        /* Admin */
        .admin-panel { max-width: 900px; margin: 0 auto; background: rgba(24, 24, 27, 0.8); border: 1px solid #27272a; border-radius: 16px; padding: 24px; padding-bottom: 80px; }
        .admin-input { width: 100%; background: #18181b; border: 1px solid #27272a; border-radius: 10px; padding: 14px; color: white; outline: none; margin-bottom: 12px; }
        .admin-input:focus { border-color: #00D17A; }
        .btn-primary { background: #00D17A; color: #08090A; font-weight: 700; padding: 12px 20px; border-radius: 10px; border: none; font-size: 14px; }
        .btn-sm { font-size: 12px; padding: 8px 16px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; margin-top: 20px; }
        th, td { padding: 14px 16px; border-bottom: 1px solid #1e1e20; }
        th { background: #09090b; color: #a1a1aa; font-size: 11px; text-transform: uppercase; }
        .del-btn { background: none; border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="topbar">
        <button onclick="toggleSidebar()" style="background:none;border:none;color:#a1a1aa;padding:8px;">
            <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 style="font-size:16px;font-weight:700;color:white;">Maya Terminal</h1>
        <div style="width:40px;"></div>
    </div>

    <div class="app-wrapper">
        <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">M</div>
                <div><h1 style="font-size:16px;font-weight:700;color:white;">Maya Terminal</h1><p style="font-size:10px;color:#52525b;text-transform:uppercase;letter-spacing:0.1em;">Operations Hub</p></div>
            </div>
            
            <div class="sidebar-nav">
                <button class="nav-btn active" onclick="showPage('dashboard', this)" data-page="dashboard">Dashboard</button>
                <button class="nav-btn" onclick="showPage('comms', this)" data-page="comms">💬 Floor Comms</button>
                
                <div id="admin-nav-label" class="nav-label" style="display:none;">Administration</div>
                <button id="admin-nav-btn" class="nav-btn" onclick="showPage('admin', this)" data-page="admin" style="display:none;">User Management</button>
            </div>

            <div class="sidebar-footer">
                <div id="sidebar-avatar" style="width:36px;height:36px;border-radius:50%;background:#18181b;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#00D17A;">A</div>
                <div style="flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">
                    <div id="sidebar-name" style="font-size:14px;font-weight:500;color:#e4e4e7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">User</div>
                    <div id="sidebar-role" style="font-size:11px;color:#71717a;">Role</div>
                </div>
                <button onclick="handleLogout()" style="background:none;border:none;color:#52525b;padding:8px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </button>
            </div>
        </div>

        <div class="main-content">
            
            <!-- DASHBOARD -->
            <div id="page-dashboard" class="page active">
                <h2 style="font-size:24px;font-weight:700;color:white;margin-bottom:8px;">Welcome back, <span id="dash-name" style="color:#00D17A;">User</span></h2>
                <p style="color:#71717a;margin-bottom:40px;">Internal Operations Hub</p>
                <div class="dash-grid">
                    <button class="dash-card" onclick="showPage('comms')">
                        <div style="width:48px;height:48px;border-radius:12px;background:rgba(0,209,122,0.1);border:1px solid rgba(0,209,122,0.2);display:flex;align-items:center;justify-content:center;color:#00D17A;margin-bottom:16px;">💬</div>
                        <h3 style="font-size:20px;font-weight:700;color:white;margin-bottom:8px;">Floor Comms</h3>
                        <p style="color:#71717a;font-size:14px;">Open the team chat to communicate with agents and managers.</p>
                    </button>
                    <div class="dash-card">
                        <div style="width:48px;height:48px;border-radius:12px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);display:flex;align-items:center;justify-content:center;color:#60a5fa;margin-bottom:16px;">✅</div>
                        <h3 style="font-size:20px;font-weight:700;color:white;margin-bottom:8px;">System Status</h3>
                        <div style="display:flex;align-items:center;gap:8px;margin-top:12px;">
                            <span style="width:8px;height:8px;border-radius:50%;background:#00D17A;display:inline-block;"></span>
                            <p style="color:#a1a1aa;font-size:14px;">All Systems Operational</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- COMMS -->
            <div id="page-comms" class="page page-chat">
                <div class="chat-container">
                    <div class="chat-sidebar">
                        <div class="chat-header"><h3 style="font-size:14px;font-weight:700;color:white;">Channels</h3></div>
                        <div style="flex:1;overflow-y:auto;padding:8px;">
                            <button class="ch-btn sel" onclick="loadChannel('general', this)"><span style="color:#71717a;">#</span> general</button>
                            <button class="ch-btn" onclick="loadChannel('announcements', this)"><span style="color:#71717a;">#</span> announcements</button>
                            <div style="padding:12px 12px 8px;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#52525b;font-weight:600;">Members</div>
                            <div id="dm-list"></div>
                        </div>
                    </div>
                    <div class="chat-main">
                        <div class="chat-header">
                            <h3 id="chat-title" style="font-size:14px;font-weight:700;color:white;"># general</h3>
                            <p id="chat-sub" style="font-size:11px;color:#71717a;">Company-wide updates</p>
                        </div>
                        <div id="chat-messages" class="chat-messages">
                            <p style="color:#52525b;font-size:14px;text-align:center;margin-top:40px;">Connecting...</p>
                        </div>
                        <div class="chat-input-area">
                            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
                            <button onclick="sendMessage(event)">Send</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ADMIN -->
            <div id="page-admin" class="page">
                <div class="admin-panel">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
                        <h2 style="font-size:18px;font-weight:700;color:white;">User Management</h2>
                        <button class="btn-primary btn-sm" onclick="document.getElementById('create-form').style.display = document.getElementById('create-form').style.display === 'none' ? 'block' : 'none'">Create User</button>
                    </div>
                    
                    <div id="create-form" style="display:none;background:#09090b;border:1px solid #27272a;border-radius:12px;padding:20px;margin-bottom:24px;">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                            <input type="text" id="c-fullname" placeholder="Full Name" class="admin-input">
                            <input type="text" id="c-empid" placeholder="Employee ID" class="admin-input" style="font-family:monospace;">
                            <input type="password" id="c-pass" placeholder="Password" class="admin-input" style="font-family:monospace;">
                            <select id="c-role" class="admin-input"><option value="AGENT">Agent</option><option value="TRAINING">Training</option><option value="TEAM LEADER">Team Leader</option><option value="OPERATIONS MANAGER">Ops Manager</option></select>
                        </div>
                        <button class="btn-primary" onclick="createUser()">Save User</button>
                    </div>

                    <div style="overflow-x:auto;border:1px solid #27272a;border-radius:10px;">
                        <table>
                            <thead><tr><th>ID</th><th>Name</th><th style="text-align:center;">Role</th><th style="text-align:right;">Action</th></tr></thead>
                            <tbody id="admin-tbody"><tr><td colspan="4" style="text-align:center;color:#52525b;padding:24px;">Loading...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentUser = null;
        let token = localStorage.getItem('maya_token') || null;
        let allUsers = [];
        let currentChatTarget = { type: 'channel', id: 'general' };
        let chatInterval = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        window.onload = async function() {
            if (!token) return window.location.href = '/';
            try {
                let res = await fetch('/api/auth/verify', { headers: { 'x-maya-token': token } });
                if (!res.ok) throw new Error('Auth failed');
                let data = await res.json();
                currentUser = data.user;
                setupUI();
                startPolling();
            } catch (e) {
                window.location.href = '/';
            }
        };

        function setupUI() {
            document.getElementById('sidebar-name').innerText = currentUser.name;
            document.getElementById('sidebar-role').innerText = currentUser.role;
            document.getElementById('sidebar-avatar').innerText = currentUser.name.charAt(0).toUpperCase();
            document.getElementById('dash-name').innerText = currentUser.name.split(' ')[0];
            
            if (['ADMIN', 'OPERATIONS MANAGER', 'TEAM LEADER'].includes(currentUser.role)) {
                document.getElementById('admin-nav-label').style.display = 'block';
                document.getElementById('admin-nav-btn').style.display = 'block';
            }
            loadUsers();
        }

        function showPage(pageId, btnEl) {
            // Close sidebar on tablet
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebar-overlay').classList.remove('open');
            }

            // Hide all pages
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            
            // Show selected page
            let targetPage = document.getElementById('page-' + pageId);
            if (targetPage) targetPage.classList.add('active');

            // Highlight nav
            document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
            if (btnEl) btnEl.classList.add('active');

            // Load data if needed
            if (pageId === 'admin') loadAdminTable();
            if (pageId === 'comms') getMessages();
        }

        // --- CHAT LOGIC ---
        async function loadUsers() {
            try {
                let res = await fetch('/api/comms/users', { headers: { 'x-maya-token': token } });
                if (!res.ok) throw new Error();
                allUsers = await res.json();
                let html = '';
                allUsers.filter(function(u) { return u.employeeId !== currentUser.id; }).forEach(function(u) {
                    html += '<button class="dm-btn" onclick="loadDM(\'' + u.employeeId + '\', this)"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + u.fullName + '</span><span class="role-tag" style="margin-left:8px;">' + u.role.split(' ')[0] + '</span></button>';
                });
                document.getElementById('dm-list').innerHTML = html;
            } catch (e) {
                document.getElementById('dm-list').innerHTML = '<p style="color:#f87171;font-size:12px;padding:8px;">Failed to load</p>';
            }
        }

        function loadChannel(id, el) {
            currentChatTarget = { type: 'channel', id: id };
            document.getElementById('chat-title').innerText = '# ' + id;
            document.getElementById('chat-sub').innerText = 'Company-wide channel';
            document.querySelectorAll('.ch-b
